services:
  cryostat:
    environment:
      QUARKUS_LANGCHAIN4J_OLLAMA_BASE_URL: http://ollama:11434
      QUARKUS_LANGCHAIN4J_OLLAMA_LOG_REQUESTS: "true"
      QUARKUS_LANGCHAIN4J_OLLAMA_LOG_RESPONSES: "true"
  ollama:
    init: true
    image: ${CRYOSTAT_OLLAMA_IMAGE:-ollama/ollama:latest}
    hostname: ollama
    restart: always
    expose:
      - "11434"
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      # OLLAMA_VULKAN: ${OLLAMA_VULKAN:-1}
    volumes:
      - ollama:/root/.ollama
      # FIXME these device mounts are AMD GPU-specific
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

volumes:
  ollama:
    external: true
